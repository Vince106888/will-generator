version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: esheria_wills
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  api:
    image: node:20
    working_dir: /workspace
    volumes:
      - .:/workspace
    command: bash -lc "corepack enable && pnpm install && pnpm -C apps/api dev"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/esheria_wills?schema=public
      API_PORT: 4000
      OUTPUT_DIR: ./storage
    ports:
      - "4000:4000"
    depends_on:
      - db

  web:
    image: node:20
    working_dir: /workspace
    volumes:
      - .:/workspace
    command: bash -lc "corepack enable && pnpm install && pnpm -C apps/web dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:4000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  db-data:
